name: Mirror to Gitee

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitee-mirror
  cancel-in-progress: false

jobs:
  mirror:
    # Keep the workflow harmless if this file is copied to another repository.
    if: github.repository == 'songhai-dg/review-write'
    runs-on: ubuntu-latest
    env:
      GITEE_OWNER: cufe01
      GITEE_REPO: songhai-dg
      # Keep the token available to the credential helper when later push steps run.
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN || secrets.GITEE }}

    steps:
      - name: Check out the complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure a temporary Gitee credential helper
        run: |
          test -n "$GITEE_TOKEN" || { echo "Missing GITEE_TOKEN secret" >&2; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local credential.helper '!f() { echo "username=cufe01"; echo "password=${GITEE_TOKEN}"; }; f'
          git remote add gitee "https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"

      - name: Push main to Gitee
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        run: git push gitee "HEAD:refs/heads/main"

      - name: Push the released tag to Gitee
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: git push gitee "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
